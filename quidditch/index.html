<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Złap Złotego Znicza!</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="quidditch.css">
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">Powrót do Magicznego Świata</a>

    <div id="intro" class="screen">
      <h1>Złap Złotego Znicza!</h1>
      <p class="subtitle">Leć na miotle i złap Znicza zanim ucieknie!</p>
      <div class="intro-preview">
        <!-- Player broom preview -->
        <svg class="broom-preview" id="broom-preview" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" width="100">
          <!-- Robe/body -->
          <ellipse class="preview-robe" cx="45" cy="32" rx="12" ry="14" fill="#2c1810" stroke="#1a0e08" stroke-width="1"/>
          <!-- Head -->
          <circle cx="45" cy="16" r="10" fill="#f0c8a0"/>
          <!-- Hair -->
          <path d="M35 14 Q38 6 45 5 Q52 6 55 14 Q54 10 45 9 Q36 10 35 14Z" fill="#3d2b1a"/>
          <!-- Scarf blowing -->
          <path class="preview-scarf" d="M38 24 Q30 28 25 22 Q20 26 15 24" fill="none" stroke="#ae0001" stroke-width="3" stroke-linecap="round"/>
          <!-- Glasses -->
          <circle cx="41" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
          <circle cx="49" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
          <line x1="44" y1="15" x2="46" y2="15" stroke="#333" stroke-width="1"/>
          <!-- Broom stick -->
          <line x1="30" y1="40" x2="110" y2="38" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
          <!-- Broom bristles -->
          <path d="M100 38 Q115 30 118 35 Q115 38 118 42 Q115 46 100 38Z" fill="#c8a050" stroke="#8B6914" stroke-width="1"/>
          <line x1="102" y1="36" x2="114" y2="33" stroke="#a08030" stroke-width="0.7"/>
          <line x1="102" y1="38" x2="116" y2="38" stroke="#a08030" stroke-width="0.7"/>
          <line x1="102" y1="40" x2="114" y2="43" stroke="#a08030" stroke-width="0.7"/>
          <!-- Legs on broom -->
          <line x1="40" y1="42" x2="38" y2="50" stroke="#2c1810" stroke-width="2.5"/>
          <line x1="50" y1="42" x2="52" y2="50" stroke="#2c1810" stroke-width="2.5"/>
          <!-- Shoes -->
          <ellipse cx="36" cy="51" rx="4" ry="2" fill="#1a0e08"/>
          <ellipse cx="54" cy="51" rx="4" ry="2" fill="#1a0e08"/>
        </svg>
        <span class="vs-text">VS</span>
        <!-- Snitch preview -->
        <svg class="snitch-preview-svg" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" width="80">
          <g class="wing left-wing">
            <ellipse cx="20" cy="28" rx="18" ry="8" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="0.5" transform="rotate(-15 20 28)"/>
            <ellipse cx="14" cy="22" rx="12" ry="5" fill="rgba(255,255,255,0.5)" stroke="#ccc" stroke-width="0.5" transform="rotate(-25 14 22)"/>
          </g>
          <circle cx="60" cy="30" r="14" fill="url(#snitchGold)"/>
          <circle cx="60" cy="30" r="12" fill="url(#snitchShine)"/>
          <ellipse cx="55" cy="24" rx="4" ry="3" fill="rgba(255,255,255,0.5)" transform="rotate(-20 55 24)"/>
          <g class="wing right-wing">
            <ellipse cx="100" cy="28" rx="18" ry="8" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="0.5" transform="rotate(15 100 28)"/>
            <ellipse cx="106" cy="22" rx="12" ry="5" fill="rgba(255,255,255,0.5)" stroke="#ccc" stroke-width="0.5" transform="rotate(25 106 22)"/>
          </g>
          <defs>
            <radialGradient id="snitchGold" cx="40%" cy="35%">
              <stop offset="0%" stop-color="#ffe066"/>
              <stop offset="50%" stop-color="#d4a843"/>
              <stop offset="100%" stop-color="#a67c2e"/>
            </radialGradient>
            <radialGradient id="snitchShine" cx="35%" cy="30%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
          </defs>
        </svg>
      </div>
      <p class="controls-hint">Steruj strzałkami lub WASD na klawiaturze, albo palcem na ekranie dotykowym!</p>

      <div class="house-select">
        <p class="select-label">Wybierz swój dom:</p>
        <div class="house-buttons" id="house-buttons">
          <button class="house-btn gryffindor-btn selected" data-house="gryffindor">
            <span class="house-icon">🦁</span> Gryffindor
          </button>
          <button class="house-btn hufflepuff-btn" data-house="hufflepuff">
            <span class="house-icon">🦡</span> Hufflepuff
          </button>
          <button class="house-btn ravenclaw-btn" data-house="ravenclaw">
            <span class="house-icon">🦅</span> Ravenclaw
          </button>
          <button class="house-btn slytherin-btn" data-house="slytherin">
            <span class="house-icon">🐍</span> Slytherin
          </button>
        </div>
      </div>

      <div class="difficulty-select">
        <p class="select-label">Wybierz poziom trudności:</p>
        <div class="diff-buttons">
          <button class="magic-btn diff-btn" onclick="startGame('easy')">
            Łatwy
            <span class="diff-desc">Znicz jest powolny</span>
          </button>
          <button class="magic-btn diff-btn" onclick="startGame('medium')">
            Średni
            <span class="diff-desc">Dla prawdziwego gracza</span>
          </button>
          <button class="magic-btn diff-btn" onclick="startGame('hard')">
            Trudny
            <span class="diff-desc">Szybki jak błyskawica!</span>
          </button>
        </div>
      </div>
    </div>

    <div id="game" class="screen hidden">
      <div class="game-hud">
        <div class="hud-item">
          <span class="hud-label">Złapane</span>
          <span class="hud-value" id="score">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Czas</span>
          <span class="hud-value" id="timer">30</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Najlepszy</span>
          <span class="hud-value" id="best">0</span>
        </div>
      </div>
      <div class="game-field" id="field">
        <!-- Player on broom -->
        <div class="player" id="player">
          <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
            <!-- Robe/body -->
            <ellipse class="robe" cx="45" cy="32" rx="12" ry="14" fill="#2c1810" stroke="#1a0e08" stroke-width="1"/>
            <!-- Head -->
            <circle cx="45" cy="16" r="10" fill="#f0c8a0"/>
            <!-- Hair -->
            <path d="M35 14 Q38 6 45 5 Q52 6 55 14 Q54 10 45 9 Q36 10 35 14Z" fill="#3d2b1a"/>
            <!-- Scarf blowing -->
            <path class="scarf" d="M38 24 Q30 28 25 22 Q20 26 15 24" fill="none" stroke="#ae0001" stroke-width="3" stroke-linecap="round"/>
            <!-- Glasses -->
            <circle cx="41" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
            <circle cx="49" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
            <line x1="44" y1="15" x2="46" y2="15" stroke="#333" stroke-width="1"/>
            <!-- Broom stick -->
            <line x1="30" y1="40" x2="110" y2="38" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
            <!-- Broom bristles -->
            <path d="M100 38 Q115 30 118 35 Q115 38 118 42 Q115 46 100 38Z" fill="#c8a050" stroke="#8B6914" stroke-width="1"/>
            <line x1="102" y1="36" x2="114" y2="33" stroke="#a08030" stroke-width="0.7"/>
            <line x1="102" y1="38" x2="116" y2="38" stroke="#a08030" stroke-width="0.7"/>
            <line x1="102" y1="40" x2="114" y2="43" stroke="#a08030" stroke-width="0.7"/>
            <!-- Legs on broom -->
            <line x1="40" y1="42" x2="38" y2="50" stroke="#2c1810" stroke-width="2.5"/>
            <line x1="50" y1="42" x2="52" y2="50" stroke="#2c1810" stroke-width="2.5"/>
            <!-- Shoes -->
            <ellipse cx="36" cy="51" rx="4" ry="2" fill="#1a0e08"/>
            <ellipse cx="54" cy="51" rx="4" ry="2" fill="#1a0e08"/>
          </svg>
        </div>

        <!-- Snitch -->
        <div class="snitch" id="snitch">
          <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
            <g class="wing left-wing">
              <ellipse cx="20" cy="28" rx="18" ry="8" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="0.5" transform="rotate(-15 20 28)"/>
              <ellipse cx="14" cy="22" rx="12" ry="5" fill="rgba(255,255,255,0.5)" stroke="#ccc" stroke-width="0.5" transform="rotate(-25 14 22)"/>
            </g>
            <circle cx="60" cy="30" r="14" fill="url(#sg)"/>
            <circle cx="60" cy="30" r="12" fill="url(#ss)"/>
            <ellipse cx="55" cy="24" rx="4" ry="3" fill="rgba(255,255,255,0.5)" transform="rotate(-20 55 24)"/>
            <g class="wing right-wing">
              <ellipse cx="100" cy="28" rx="18" ry="8" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="0.5" transform="rotate(15 100 28)"/>
              <ellipse cx="106" cy="22" rx="12" ry="5" fill="rgba(255,255,255,0.5)" stroke="#ccc" stroke-width="0.5" transform="rotate(25 106 22)"/>
            </g>
            <defs>
              <radialGradient id="sg" cx="40%" cy="35%">
                <stop offset="0%" stop-color="#ffe066"/>
                <stop offset="50%" stop-color="#d4a843"/>
                <stop offset="100%" stop-color="#a67c2e"/>
              </radialGradient>
              <radialGradient id="ss" cx="35%" cy="30%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
                <stop offset="100%" stop-color="transparent"/>
              </radialGradient>
            </defs>
          </svg>
        </div>

        <div class="catch-effect" id="catchEffect">+1</div>
      </div>
    </div>

    <div id="result" class="screen hidden">
      <h1 id="result-title"></h1>
      <div class="result-snitch">
        <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" width="100">
          <g class="wing left-wing">
            <ellipse cx="20" cy="28" rx="18" ry="8" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="0.5" transform="rotate(-15 20 28)"/>
            <ellipse cx="14" cy="22" rx="12" ry="5" fill="rgba(255,255,255,0.5)" stroke="#ccc" stroke-width="0.5" transform="rotate(-25 14 22)"/>
          </g>
          <circle cx="60" cy="30" r="14" fill="url(#sg2)"/>
          <circle cx="60" cy="30" r="12" fill="url(#ss2)"/>
          <ellipse cx="55" cy="24" rx="4" ry="3" fill="rgba(255,255,255,0.5)" transform="rotate(-20 55 24)"/>
          <g class="wing right-wing">
            <ellipse cx="100" cy="28" rx="18" ry="8" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="0.5" transform="rotate(15 100 28)"/>
            <ellipse cx="106" cy="22" rx="12" ry="5" fill="rgba(255,255,255,0.5)" stroke="#ccc" stroke-width="0.5" transform="rotate(25 106 22)"/>
          </g>
          <defs>
            <radialGradient id="sg2" cx="40%" cy="35%">
              <stop offset="0%" stop-color="#ffe066"/>
              <stop offset="50%" stop-color="#d4a843"/>
              <stop offset="100%" stop-color="#a67c2e"/>
            </radialGradient>
            <radialGradient id="ss2" cx="35%" cy="30%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
          </defs>
        </svg>
      </div>
      <p class="result-score">Złapałeś Znicza <span id="final-score">0</span> razy!</p>
      <p class="result-msg" id="result-msg"></p>
      <div class="result-actions">
        <button class="magic-btn" onclick="backToIntro()">Zagraj ponownie</button>
        <a href="../" class="magic-btn secondary">Strona główna</a>
      </div>
    </div>
  </div>

  <script src="quidditch.js"></script>
</body>
</html>
