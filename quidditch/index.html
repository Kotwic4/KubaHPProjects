<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Złap Złotego Znicza!</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="../style.css?v=11">
  <link rel="stylesheet" href="quidditch.css?v=12">
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">Powrót do Magicznego Świata</a>

    <div id="intro" class="screen">
      <h1>Złap Złotego Znicza!</h1>
      <p class="subtitle">Leć na miotle i złap Znicza zanim ucieknie!</p>

      <!-- Mode select -->
      <div class="mode-select">
        <div class="mode-buttons" id="mode-buttons">
          <button class="magic-btn mode-btn selected" data-count="1">1 Gracz</button>
          <button class="magic-btn mode-btn" data-count="2">2 Graczy</button>
          <button class="magic-btn mode-btn" data-count="3">3 Graczy</button>
          <button class="magic-btn mode-btn" data-count="4">4 Graczy</button>
        </div>
      </div>

      <!-- Player setup (name + house grouped per player) -->
      <div class="player-setup" id="p1-setup">
        <div class="player-setup-header">
          <label for="p1-name" class="select-label" id="p1-name-label">Twoje imię:</label>
          <input type="text" id="p1-name" class="magic-input" placeholder="Gracz 1" maxlength="15">
        </div>
        <div class="house-buttons" id="house-buttons-p1">
          <button class="house-btn gryffindor-btn selected" data-house="gryffindor"><span class="house-icon">🦁</span> Gryffindor</button>
          <button class="house-btn hufflepuff-btn" data-house="hufflepuff"><span class="house-icon">🦡</span> Hufflepuff</button>
          <button class="house-btn ravenclaw-btn" data-house="ravenclaw"><span class="house-icon">🦅</span> Ravenclaw</button>
          <button class="house-btn slytherin-btn" data-house="slytherin"><span class="house-icon">🐍</span> Slytherin</button>
        </div>
      </div>
      <div class="player-setup hidden" id="p2-setup">
        <div class="player-setup-header">
          <label for="p2-name" class="select-label">Gracz 2:</label>
          <input type="text" id="p2-name" class="magic-input" placeholder="Gracz 2" maxlength="15">
        </div>
        <div class="house-buttons" id="house-buttons-p2">
          <button class="house-btn gryffindor-btn" data-house="gryffindor"><span class="house-icon">🦁</span> Gryffindor</button>
          <button class="house-btn hufflepuff-btn" data-house="hufflepuff"><span class="house-icon">🦡</span> Hufflepuff</button>
          <button class="house-btn ravenclaw-btn" data-house="ravenclaw"><span class="house-icon">🦅</span> Ravenclaw</button>
          <button class="house-btn slytherin-btn selected" data-house="slytherin"><span class="house-icon">🐍</span> Slytherin</button>
        </div>
      </div>
      <div class="player-setup hidden" id="p3-setup">
        <div class="player-setup-header">
          <label for="p3-name" class="select-label">Gracz 3:</label>
          <input type="text" id="p3-name" class="magic-input" placeholder="Gracz 3" maxlength="15">
        </div>
        <div class="house-buttons" id="house-buttons-p3">
          <button class="house-btn gryffindor-btn" data-house="gryffindor"><span class="house-icon">🦁</span> Gryffindor</button>
          <button class="house-btn hufflepuff-btn" data-house="hufflepuff"><span class="house-icon">🦡</span> Hufflepuff</button>
          <button class="house-btn ravenclaw-btn selected" data-house="ravenclaw"><span class="house-icon">🦅</span> Ravenclaw</button>
          <button class="house-btn slytherin-btn" data-house="slytherin"><span class="house-icon">🐍</span> Slytherin</button>
        </div>
      </div>
      <div class="player-setup hidden" id="p4-setup">
        <div class="player-setup-header">
          <label for="p4-name" class="select-label">Gracz 4:</label>
          <input type="text" id="p4-name" class="magic-input" placeholder="Gracz 4" maxlength="15">
        </div>
        <div class="house-buttons" id="house-buttons-p4">
          <button class="house-btn gryffindor-btn" data-house="gryffindor"><span class="house-icon">🦁</span> Gryffindor</button>
          <button class="house-btn hufflepuff-btn selected" data-house="hufflepuff"><span class="house-icon">🦡</span> Hufflepuff</button>
          <button class="house-btn ravenclaw-btn" data-house="ravenclaw"><span class="house-icon">🦅</span> Ravenclaw</button>
          <button class="house-btn slytherin-btn" data-house="slytherin"><span class="house-icon">🐍</span> Slytherin</button>
        </div>
      </div>

      <p class="controls-hint" id="controls-hint">Steruj joystickiem, strzałkami lub WASD!</p>

      <div class="difficulty-select">
        <p class="select-label">Wybierz poziom trudności:</p>
        <div class="diff-buttons">
          <button class="magic-btn diff-btn" onclick="startGame('easy')">Łatwy<span class="diff-desc">Znicz jest powolny</span></button>
          <button class="magic-btn diff-btn" onclick="startGame('medium')">Średni<span class="diff-desc">Dla prawdziwego gracza</span></button>
          <button class="magic-btn diff-btn" onclick="startGame('hard')">Trudny<span class="diff-desc">Szybki jak błyskawica!</span></button>
        </div>
      </div>
    </div>

    <div id="game" class="screen hidden">
      <div class="game-hud">
        <div id="scores-hud" class="scores-hud"></div>
        <div class="hud-item">
          <span class="hud-label">Czas</span>
          <span class="hud-value" id="timer">30</span>
        </div>
      </div>
      <div class="game-field" id="field">
        <!-- Players 1-4 (same SVG, colors set by JS) -->
        <div class="player" id="player1">
          <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
            <ellipse class="robe" cx="45" cy="32" rx="12" ry="14" fill="#2c1810" stroke="#1a0e08" stroke-width="1"/>
            <circle cx="45" cy="16" r="10" fill="#f0c8a0"/>
            <path class="hair" d="M35 14 Q38 6 45 5 Q52 6 55 14 Q54 10 45 9 Q36 10 35 14Z" fill="#3d2b1a"/>
            <path class="scarf" d="M38 24 Q30 28 25 22 Q20 26 15 24" fill="none" stroke="#ae0001" stroke-width="3" stroke-linecap="round"/>
            <circle cx="41" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
            <circle cx="49" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
            <line x1="44" y1="15" x2="46" y2="15" stroke="#333" stroke-width="1"/>
            <line x1="30" y1="40" x2="110" y2="38" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
            <path d="M100 38 Q115 30 118 35 Q115 38 118 42 Q115 46 100 38Z" fill="#c8a050" stroke="#8B6914" stroke-width="1"/>
            <line x1="40" y1="42" x2="38" y2="50" stroke="#2c1810" stroke-width="2.5"/>
            <line x1="50" y1="42" x2="52" y2="50" stroke="#2c1810" stroke-width="2.5"/>
            <ellipse cx="36" cy="51" rx="4" ry="2" fill="#1a0e08"/>
            <ellipse cx="54" cy="51" rx="4" ry="2" fill="#1a0e08"/>
          </svg>
        </div>
        <div class="player hidden" id="player2">
          <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
            <ellipse class="robe" cx="45" cy="32" rx="12" ry="14" fill="#2c1810" stroke="#1a0e08" stroke-width="1"/>
            <circle cx="45" cy="16" r="10" fill="#f0c8a0"/>
            <path class="hair" d="M35 14 Q38 6 45 5 Q52 6 55 14 Q54 10 45 9 Q36 10 35 14Z" fill="#8b5e3c"/>
            <path class="scarf" d="M38 24 Q30 28 25 22 Q20 26 15 24" fill="none" stroke="#2a623d" stroke-width="3" stroke-linecap="round"/>
            <circle cx="41" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
            <circle cx="49" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
            <line x1="44" y1="15" x2="46" y2="15" stroke="#333" stroke-width="1"/>
            <line x1="30" y1="40" x2="110" y2="38" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
            <path d="M100 38 Q115 30 118 35 Q115 38 118 42 Q115 46 100 38Z" fill="#c8a050" stroke="#8B6914" stroke-width="1"/>
            <line x1="40" y1="42" x2="38" y2="50" stroke="#2c1810" stroke-width="2.5"/>
            <line x1="50" y1="42" x2="52" y2="50" stroke="#2c1810" stroke-width="2.5"/>
            <ellipse cx="36" cy="51" rx="4" ry="2" fill="#1a0e08"/>
            <ellipse cx="54" cy="51" rx="4" ry="2" fill="#1a0e08"/>
          </svg>
        </div>
        <div class="player hidden" id="player3">
          <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
            <ellipse class="robe" cx="45" cy="32" rx="12" ry="14" fill="#2c1810" stroke="#1a0e08" stroke-width="1"/>
            <circle cx="45" cy="16" r="10" fill="#f0c8a0"/>
            <path class="hair" d="M35 14 Q38 6 45 5 Q52 6 55 14 Q54 10 45 9 Q36 10 35 14Z" fill="#8b2500"/>
            <path class="scarf" d="M38 24 Q30 28 25 22 Q20 26 15 24" fill="none" stroke="#222f5b" stroke-width="3" stroke-linecap="round"/>
            <circle cx="41" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
            <circle cx="49" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
            <line x1="44" y1="15" x2="46" y2="15" stroke="#333" stroke-width="1"/>
            <line x1="30" y1="40" x2="110" y2="38" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
            <path d="M100 38 Q115 30 118 35 Q115 38 118 42 Q115 46 100 38Z" fill="#c8a050" stroke="#8B6914" stroke-width="1"/>
            <line x1="40" y1="42" x2="38" y2="50" stroke="#2c1810" stroke-width="2.5"/>
            <line x1="50" y1="42" x2="52" y2="50" stroke="#2c1810" stroke-width="2.5"/>
            <ellipse cx="36" cy="51" rx="4" ry="2" fill="#1a0e08"/>
            <ellipse cx="54" cy="51" rx="4" ry="2" fill="#1a0e08"/>
          </svg>
        </div>
        <div class="player hidden" id="player4">
          <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
            <ellipse class="robe" cx="45" cy="32" rx="12" ry="14" fill="#2c1810" stroke="#1a0e08" stroke-width="1"/>
            <circle cx="45" cy="16" r="10" fill="#f0c8a0"/>
            <path class="hair" d="M35 14 Q38 6 45 5 Q52 6 55 14 Q54 10 45 9 Q36 10 35 14Z" fill="#c8a050"/>
            <path class="scarf" d="M38 24 Q30 28 25 22 Q20 26 15 24" fill="none" stroke="#ecb939" stroke-width="3" stroke-linecap="round"/>
            <circle cx="41" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
            <circle cx="49" cy="15" r="3" fill="none" stroke="#333" stroke-width="1"/>
            <line x1="44" y1="15" x2="46" y2="15" stroke="#333" stroke-width="1"/>
            <line x1="30" y1="40" x2="110" y2="38" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
            <path d="M100 38 Q115 30 118 35 Q115 38 118 42 Q115 46 100 38Z" fill="#c8a050" stroke="#8B6914" stroke-width="1"/>
            <line x1="40" y1="42" x2="38" y2="50" stroke="#2c1810" stroke-width="2.5"/>
            <line x1="50" y1="42" x2="52" y2="50" stroke="#2c1810" stroke-width="2.5"/>
            <ellipse cx="36" cy="51" rx="4" ry="2" fill="#1a0e08"/>
            <ellipse cx="54" cy="51" rx="4" ry="2" fill="#1a0e08"/>
          </svg>
        </div>

        <!-- Snitch -->
        <div class="snitch" id="snitch">
          <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
            <g class="wing left-wing"><ellipse cx="20" cy="28" rx="18" ry="8" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="0.5" transform="rotate(-15 20 28)"/></g>
            <circle cx="60" cy="30" r="14" fill="url(#sg)"/>
            <circle cx="60" cy="30" r="12" fill="url(#ss)"/>
            <ellipse cx="55" cy="24" rx="4" ry="3" fill="rgba(255,255,255,0.5)" transform="rotate(-20 55 24)"/>
            <g class="wing right-wing"><ellipse cx="100" cy="28" rx="18" ry="8" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="0.5" transform="rotate(15 100 28)"/></g>
            <defs>
              <radialGradient id="sg" cx="40%" cy="35%"><stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#d4a843"/><stop offset="100%" stop-color="#a67c2e"/></radialGradient>
              <radialGradient id="ss" cx="35%" cy="30%"><stop offset="0%" stop-color="rgba(255,255,255,0.3)"/><stop offset="100%" stop-color="transparent"/></radialGradient>
            </defs>
          </svg>
        </div>

        <div class="catch-effect" id="catchEffect">+1</div>
      </div>

      <!-- Joysticki -->
      <div class="joysticks hidden" id="joysticks">
        <div class="joystick-wrapper" id="joy-wrapper-p1">
          <span class="joy-label" id="joy-label-p1">Gracz 1</span>
          <div class="joystick" id="joystick1"><div class="joystick-knob" id="knob1"></div></div>
        </div>
        <div class="joystick-wrapper hidden" id="joy-wrapper-p2">
          <span class="joy-label" id="joy-label-p2">Gracz 2</span>
          <div class="joystick" id="joystick2"><div class="joystick-knob" id="knob2"></div></div>
        </div>
        <div class="joystick-wrapper hidden" id="joy-wrapper-p3">
          <span class="joy-label" id="joy-label-p3">Gracz 3</span>
          <div class="joystick" id="joystick3"><div class="joystick-knob" id="knob3"></div></div>
        </div>
        <div class="joystick-wrapper hidden" id="joy-wrapper-p4">
          <span class="joy-label" id="joy-label-p4">Gracz 4</span>
          <div class="joystick" id="joystick4"><div class="joystick-knob" id="knob4"></div></div>
        </div>
      </div>
    </div>

    <div id="result" class="screen hidden">
      <h1 id="result-title"></h1>
      <p class="result-score" id="result-score-text"></p>
      <p class="result-msg" id="result-msg"></p>
      <div class="result-actions">
        <button class="magic-btn" onclick="backToIntro()">Zagraj ponownie</button>
        <a href="../" class="magic-btn secondary">Strona główna</a>
      </div>
    </div>

    <footer class="app-footer"><span id="app-version"></span></footer>
  </div>

  <script src="quidditch.js?v=12"></script>
  <script src="../version.js?v=11"></script>
</body>
</html>
